services:
  - type: web
    name: techmart-support-backend
    env: python
    region: oregon
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: "support.db"
      - key: RESEND_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_URL
        sync: false
